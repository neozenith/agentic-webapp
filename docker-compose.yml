# Local two-container run integrated against the DEV cloud services (GCS + BigQuery
# + Vertex), using YOUR Application Default Credentials (mounted read-only). Ports
# bind to 0.0.0.0 so you can reach them from another device on the same wifi:
#   backend:    http://<laptop-lan-ip>:8080
#   agent UI:   http://<laptop-lan-ip>:8081/dev-ui/
#
#   gcloud auth application-default login   # once
#   docker compose up --build
services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    ports:
      - "8081:8081"
    environment:
      GOOGLE_GENAI_USE_VERTEXAI: "True"
      GOOGLE_CLOUD_PROJECT: dbt-dev-jaffleshop
      GCP_PROJECT: dbt-dev-jaffleshop
      GOOGLE_CLOUD_LOCATION: us-central1
      AGENT_MODEL: gemini-2.5-flash-lite
      # Durable sessions + bookkeeping in the dev Firestore (named) database.
      SESSION_SERVICE_URI: "firestore://"
      DATABASE_BACKEND: firestore
      FIRESTORE_DATABASE: agentic-webapp
      # Analytics (AnalyticsManager) is its own axis: BigQuery in the cloud-integrated run.
      BIGQUERY_DATASET: agentic_webapp
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/adc.json
      # The agent's asset tools reach the backend by compose service name.
      BACKEND_BASE_URL: http://backend:8080
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcp/adc.json:ro

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT: local-cloud
      # Integrate against the real dev cloud services.
      STORAGE_BACKEND: gcs
      DATABASE_BACKEND: firestore
      GCP_PROJECT: dbt-dev-jaffleshop
      ASSETS_BUCKET: dbt-dev-jaffleshop-agentic-webapp-assets
      FIRESTORE_DATABASE: agentic-webapp
      # Analytics + semantic layer + dashboards share the BigQuery analytics axis.
      BIGQUERY_DATASET: agentic_webapp
      # Reach the agent + dbt sidecars by compose service name.
      AGENT_BASE_URL: http://agent:8081
      DBT_BASE_URL: http://dbt:8082
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/adc.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcp/adc.json:ro
    depends_on:
      - agent
      - dbt

  # dbt-core sidecar: a FastAPI service wrapping the dbt CLI against the dev BigQuery
  # dataset. The backend proxies /api/dbt/* here; `dbt run` materialises the marts that
  # the semantic layer + dashboards read.
  dbt:
    build:
      context: .
      dockerfile: dbt/Dockerfile
    ports:
      - "8082:8082"
    environment:
      GCP_PROJECT: dbt-dev-jaffleshop
      BIGQUERY_DATASET: agentic_webapp
      BIGQUERY_LOCATION: australia-southeast1
      DBT_TARGET: dev
      DBT_PROJECT_DIR: /app
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/adc.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcp/adc.json:ro
