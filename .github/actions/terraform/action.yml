name: Terraform
description: |
  Authenticate to GCP via Workload Identity Federation and drive the curated `tfs`
  CLI to run terraform init + (plan | apply) for one environment of a single
  infra/stacks/<stack> stack. Container images build as first-class terraform
  resources (infra/stacks/webapp/build.tf) sequenced by the dependency graph
  (repo -> build -> Cloud Run), so this action carries no image-build step.

inputs:
  env:
    description: Environment name — one of dev / test / prod.
    required: true
  stack:
    description: Stack name under infra/stacks/.
    required: false
    default: webapp
  action:
    description: Terraform action — "plan" or "apply".
    required: true
  workload_identity_provider:
    description: Full WIF provider resource (from GitHub Environment vars.WIF_PROVIDER).
    required: true
  service_account:
    description: Deployer service account email (from GitHub Environment vars.TF_SA).
    required: true
  terraform_version:
    description: Terraform CLI version to install.
    required: false
    default: '1.10.0'

runs:
  using: composite
  steps:
    - id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}

    - uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ inputs.terraform_version }}

    # gcloud: tfs's project guardrail (check_project) AND the in-DAG image builds
    # (terraform_data.{image,agent_image} run `gcloud builds submit` via local-exec
    # during apply). No Docker daemon is needed — Cloud Build builds remotely.
    - uses: google-github-actions/setup-gcloud@v3

    # uv: runs the curated `tfs` CLI.
    - uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: "infra/tfs/uv.lock"

    # Everything below drives terraform through the curated `tfs` CLI — the single,
    # opinionated deploy interface. `tfs plan` and `tfs apply` use IDENTICAL flags
    # (a direct apply: no saved plan, no -target), so plan and apply never diverge.
    - name: tfs init
      shell: bash
      run: uv run --frozen --directory infra/tfs tfs init ${{ inputs.stack }} ${{ inputs.env }}

    - if: inputs.action == 'plan'
      name: tfs plan
      shell: bash
      run: uv run --frozen --directory infra/tfs tfs plan ${{ inputs.stack }} ${{ inputs.env }}

    - if: inputs.action == 'apply'
      name: tfs apply
      shell: bash
      run: uv run --frozen --directory infra/tfs tfs apply ${{ inputs.stack }} ${{ inputs.env }}
